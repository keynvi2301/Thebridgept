name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: artifacts/thebridgept

      - name: Build
        run: pnpm run build
        working-directory: artifacts/thebridgept

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: artifacts/thebridgept/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
