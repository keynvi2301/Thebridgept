kind = "web"
previewPath = "/"
title = "TheBridgePT"
version = "1.0.0"
id = "artifacts/thebridgept"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22133

[services.development]
run = "pnpm --filter @workspace/thebridgept run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thebridgept", "run", "build" ]
publicDir = "artifacts/thebridgept/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22133"
BASE_PATH = "/"
